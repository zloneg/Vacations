services:
  mysql:
    image: mysql:8.0
    container_name: vacations-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: vacations_project
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./Database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    container_name: vacations-backend
    depends_on:
      - mysql
    environment:
      PORT: 4000
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: 1234
      DB_NAME: vacations_project
      JWT_SECRET: my_super_secret_key_12345
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: vacations-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  mysql_data: